<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux IDM</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Linux IDM</span>
      </div>
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span class="status-text">Checking...</span>
      </div>
    </header>

    <section class="stats">
      <div class="stat-item">
        <span class="stat-value" id="downloadCount">0</span>
        <span class="stat-label">Downloads</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="currentSpeed">0 KB/s</span>
        <span class="stat-label">Speed</span>
      </div>
    </section>

    <section class="add-url">
      <div class="input-group">
        <input type="text" id="urlInput" placeholder="Paste URL to download...">
        <button id="addBtn" title="Download">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </section>

    <section class="settings">
      <div class="setting-row">
        <span class="setting-label">Auto-capture downloads</span>
        <label class="toggle">
          <input type="checkbox" id="autoCapture" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </section>

    <footer class="footer">
      <span class="version">v1.0.0</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
